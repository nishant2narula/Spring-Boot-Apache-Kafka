spring.application.name=notification-service
spring.kafka.bootstrap-servers=localhost:9092
spring.kafka.consumer.group-id=notification-service
spring.kafka.consumer.key-deserializer=org.apache.kafka.common.serialization.LongDeserializer
spring.kafka.consumer.value-deserializer=org.springframework.kafka.support.serializer.JsonDeserializer
spring.kafka.consumer.properties.spring.json.trusted.packages= *
spring.kafka.consumer.properties.spring.json.type.mapping=user_service_kafka.user_service.event.UserCreatedEvent:notification_service_kafka.notification_service.user_service.event.UserCreatedEvent
server.port = 9060
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true
spring.jpa.database-platform=org.hibernate.dialect.MySQLDialect
spring.datasource.url=jdbc:mysql://localhost:3306/SpringDataJPA?useSSL=false
spring.datasource.username=root
spring.datasource.password=###

